name: Build and Push PDF Server to Aliyun ACR

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

env:
    REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
    NAMESPACE: ${{ secrets.ALIYUN_NAME_SPACE }}
    ALIYUN_REGISTRY_USER: ${{ secrets.ALIYUN_REGISTRY_USER }}
    ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

jobs:
    build-pdf-server:
        runs-on: ubuntu-latest

        steps:
            - name: Maximize build space
              uses: easimon/maximize-build-space@v10
              with:
                  root-reserve-mb: 1024
                  swap-size-mb: 1024
                  remove-dotnet: "true"
                  remove-haskell: "true"
                  remove-android: "true"
                  remove-codeql: "true"
                  build-mount-path: "/var/lib/docker"

            - name: Restart docker
              run: sudo service docker restart

            - name: Extra cleanup
              run: |
                  docker system prune -af || true
                  docker buildx prune -af || true

            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3
              with:
                  platforms: amd64,arm64

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Aliyun ACR
              run: |
                  set -euo pipefail
                  echo "$ALIYUN_REGISTRY_PASSWORD" | docker login \
                    --username "$ALIYUN_REGISTRY_USER" \
                    --password-stdin "$REGISTRY"

            - name: Prepare image tags
              id: prep
              run: |
                  set -euo pipefail
                  IMAGE=${REGISTRY}/${NAMESPACE}/react-docs-pdf-server
                  VERSION=${GITHUB_REF_NAME}
                  echo "image=$IMAGE" >> $GITHUB_OUTPUT
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Build and Push PDF Server
              run: |
                  set -euo pipefail
                  docker buildx build \
                    --platform linux/amd64,linux/arm64 \
                    --provenance=false \
                    --cache-from=type=gha,scope=pdf-server \
                    --cache-to=type=gha,mode=max,scope=pdf-server \
                    -t ${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.version }} \
                    -t ${{ steps.prep.outputs.image }}:latest \
                    --push \
                    -f ./docker/pdf-server/Dockerfile \
                    .
