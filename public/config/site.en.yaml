# PWA Configuration
pwa:
    enabled: true
    name: "React Docs UI"
    shortName: "ReactDocsUI"
    description: "Beautiful documentation websites made simple"
    themeColor: "#ffffff"
    backgroundColor: "#ffffff"

# Context Menu Configuration
contextMenu:
    # Global switch, set to false to completely disable context menu
    enabled: true

    # Page group menu items configuration
    page:
        copySelectedText: true # Copy selected text
        copyUrl: true # Copy current URL
        copyTitle: false # Copy page title
        copyMarkdownLink: false # Copy Markdown link
        openInNewTab: false # Open in new tab
        reload: true # Refresh
        printPage: true # Print page
        scrollToTop: true # Scroll to top
        scrollToBottom: true # Scroll to bottom

    # Site group menu items configuration
    site:
        goHome: true # Go to home
        quickNav: false # Quick navigation
        language: false # Language switch

    # Appearance group menu items configuration
    appearance:
        theme: false # Theme switch
        resetThemePref: false # Reset theme preference

# MDX Component Configuration
mdx:
    componentsPath: "/src/components" # Component scan path
    enabled: true # Enable MDX support

# Fonts Configuration
fonts:
    fontFamilyZhCn: "MiSans, PingFang SC, Noto Sans SC, Microsoft YaHei, sans-serif"
    fontFamilyEn: "Fragment Mono, system-ui, sans-serif"
    downloadFonts:
        - "FragmentMono-Italic.woff2"
        - "FragmentMono-Regular.woff2"
        - "MiSans-Bold.woff2"
        - "MiSans-Medium.woff2"
        - "MiSans-Regular.woff2"

# Code highlight configuration
codeHighlight:
    # Common supported languages / aliases:
    # bash, shell, sh
    # javascript, js
    # typescript, ts
    # jsx, tsx
    # json
    # yaml, yml
    # markdown, md
    # html, css, scss, less
    # python, py
    # java, c, cpp, csharp, go, rust, ruby, php, swift, kotlin, sql
    # vue, svelte, docker, dockerfile, nginx, xml, diff, regex
    # Add more items to langs when needed; names should match Shiki language ids or these aliases.
    # Preload only the languages used by this site. Unlisted fences fall back to plain code.
    langs:
        - "bash"
        - "markdown"
        - "yaml"
        - "javascript"
        - "jsx"
        - "json"
        - "tsx"
        - "typescript"
    lightTheme: "github-light"
    darkTheme: "github-dark"

# Full-text Search Configuration
search:
    enabled: true
    placeholder: "Search docs..."
    maxResults: 20
    snippetLength: 120

# Export Configuration
export:
    enabled: true
    markdown: true
    pdf: true
    word: true
    allDocs: true
    # PDF Server Configuration (optional)
    # When enabled, PDF will be generated server-side, otherwise use browser native print
    pdfServer:
        enabled: false
        url: "http://localhost:3001"

pageMeta:
    showLastUpdated: true
    showEditLink: true
    showAuthors: true
    preferGitMeta: true

editLink:
    enabled: true
    label: "Edit this page"
    urlTemplate: "https://github.com/shenjianZ/react-docs-ui/edit/main/{filePath}"

feedback:
    enabled: true
    endpoint: ""
    method: "POST"
    includePageMeta: true
    labels:
        helpful: "Helpful"
        unhelpful: "Not helpful"
        inputPlaceholder: "Tell us what is unclear or missing"
        submit: "Submit feedback"
        thanks: "Thanks for your feedback"
