                link: "https://github.com/shenjianZ/React-docs-ui"
                external: true
              - title: "License"
                link: "https://github.com/shenjianZ/React-docs-ui/blob/master/LICENSE"
                external: true
              - title: "Back to Top"
                link: "#"
                action: "scrollTop"
    links:
        - title: "Documentation"
          link: "/docs/guide/introduction"
        - title: "GitHub"
          link: "https://github.com/shenjianZ/React-docs-ui"
          external: true
        - title: "License"
          link: "https://github.com/shenjianZ/React-docs-ui/blob/master/LICENSE"
          external: true
    social:
        - name: "email"
          url: "mailto:contact@example.com"
          icon: "mail"
        - name: "github"
          link: "https://github.com/shenjianZ/React-docs-ui"
          icon: "github"
        # - name: "youtube"
        #   url: "https://youtube.com/@yourhandle"
        #   icon: "youtube"
        # - name: "twitter"
        #   url: "https://twitter.com/yourhandle"
        #   icon: "twitter"
        # - name: "discord"
