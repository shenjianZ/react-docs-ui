# Website Configuration
site:
    title: "React Docs UI Example"
    description: "Example documentation website built with React Docs UI"
    # Logo formats supported:
    # 1. emoji: "🤖"
    # 2. image URL: "https://example.com/logo.png"
    # 3. local image: "/images/logo.png"
    # 4. relative path: "./assets/logo.svg"
    logo:
        light: "/images/favicon.svg"
        dark: "/images/favicon-dark.svg"
    author: "React Docs UI Team"

# Navigation Bar Configuration
navbar:
    showLogo: true
    showTitle: true
    showLanguageSwitcher: true
    items:
        - title: "Home"
          link: "/"
          active: true
        - title: "Document"
          link: "/docs"
    actions:
        - type: "github"
          link: "https://github.com/shenjianZ/React-docs-ui"
          enabled: true
        # Common code hosting / external links are supported out of the box.
        # Available icon/type examples: github, gitee, gitea, gitlab, link, external, globe
        - type: "gitee"
          link: "https://gitee.com/your-org/your-repo"
          enabled: false
        - type: "gitea"
          link: "https://git.example.com/your-org/your-repo"
          enabled: false
        - title: "API"
          icon: "link"
          link: "https://example.com/api"
          enabled: false

# Sidebar Navigation Configuration
sidebar:
    enabled: true
    collections:
        docs:
            sections:
                - title: "Getting Started"
                  path: "/docs/guide"
                  children:
                      - title: "Introduction"
                        path: "/docs/guide/introduction"
                      - title: "Installation"
                        path: "/docs/guide/installation"
                      - title: "Quick Start"
                        path: "/docs/guide/quick-start"
                      - title: "Configuration"
                        path: "/docs/guide/configuration"
                      - title: "PDF Server Deployment"
                        path: "/docs/guide/pdf-server"
                - title: "Documentation Tests"
                  path: "/docs/test"
                  children:
                      - title: "MD Test"
                        path: "/docs/test/test"
                      - title: "KaTeX Test"
                        path: "/docs/test/katex-test"
                      - title: "MDX Demo"
                        path: "/docs/test/mdx-test"
                      - title: "Frontmatter Test"
                        path: "/docs/test/frontmatter-test"

# Theme Configuration
theme:
    # Default theme mode: 'light' | 'dark' | 'auto'
    # light: Force light mode
    # dark: Force dark mode
    # auto: Follow system preference (default)
    defaultMode: "auto"

    # Allow users to toggle theme (show theme toggle button)
    allowToggle: true

# Table of Contents Configuration
toc:
    # Maximum heading level to display in TOC (1-6)
    maxLevel: 3

    # Enable table of contents
    enabled: true

    # TOC title
    title: "On This Page"

# Image viewer configuration
imageViewer:
    enabled: true
    labels:
        preview: "Preview image"
        zoomIn: "Zoom in"
        zoomOut: "Zoom out"
        fit: "Fit to viewport"
        actualSize: "Actual size"
        reset: "Reset"
        rotateLeft: "Rotate left"
        rotateRight: "Rotate right"
        fullscreen: "Fullscreen"
        download: "Download"
        openInNewTab: "Open in new tab"
        close: "Close image viewer"

# Footer Configuration
footer:
    enabled: true
    copyright: "© 2025 React Docs UI. All rights reserved."
    repository:
        url: "https://github.com/shenjianZ/React-docs-ui"
        branch: "master"
    lastUpdated: "2026-03-05"
    version: "v0.4.0"
    groups:
        - title: "Community"
          items:
              - title: "Discussions"
                link: "https://github.com/shenjianZ/React-docs-ui/discussions"
                external: true
              - title: "Issues"
                link: "https://github.com/shenjianZ/React-docs-ui/issues"
                external: true
              - title: "Contributing"
                link: "https://github.com/shenjianZ/React-docs-ui/blob/master/CONTRIBUTING.md"
                external: true
              - title: "Releases"
                link: "https://github.com/shenjianZ/React-docs-ui/releases"
                external: true
        - title: "Help & Support"
          items:
              - title: "quick-start"
                link: "/docs/guide"
