# PWA Configuration
pwa:
    enabled: true
    name: "React Docs UI"
    shortName: "ReactDocsUI"
    description: "Beautiful documentation websites made simple"
    themeColor: "#ffffff"
    backgroundColor: "#ffffff"

# 右键菜单配置
contextMenu:
    # 全局开关，false 则完全禁用右键菜单
    enabled: true

    # 页面组菜单项配置
    page:
        copySelectedText: true # 复制选中的文字
        copyUrl: true # 复制当前链接
        copyTitle: false # 复制页面标题
        copyMarkdownLink: false # 复制 Markdown 链接
        openInNewTab: false # 在新标签页打开
        reload: true # 刷新
        printPage: true # 打印页面
        scrollToTop: true # 回到顶部
        scrollToBottom: true # 滚动到底部

    # 站点组菜单项配置
    site:
        goHome: true # 返回首页
        quickNav: false # 快速跳转
        language: false # 语言切换

    # 外观组菜单项配置
    appearance:
        theme: false # 主题切换
        resetThemePref: false # 重置主题偏好

# MDX 组件配置
mdx:
    componentsPath: "/src/components" # 组件扫描路径
    enabled: true # 启用 MDX 支持

# 字体配置
fonts:
    fontFamilyZhCn: "PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif"
    fontFamilyEn: "Fragment Mono, system-ui, sans-serif"

# 全文搜索配置
search:
    enabled: true
    placeholder: "搜索文档..."
    maxResults: 20
    snippetLength: 120

# 导出功能配置
export:
    enabled: true
    markdown: true
    pdf: true
    word: true
    allDocs: true
    # PDF 服务器配置 (可选)
    # 启用后将使用服务器端生成 PDF，否则使用浏览器原生打印
    pdfServer:
        enabled: false
        url: "http://localhost:3001"

ai:
    enabled: true
