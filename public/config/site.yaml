# 网站基本配置
site:
    title: "React Docs UI 示例项目"
    description: "基于 React Docs UI 构建的文档网站示例"
    # logo支持以下格式：
    # 1. emoji: "🤖"
    # 2. 图片URL: "https://example.com/logo.png"
    # 3. 本地图片: "/images/logo.png"
    # 4. 相对路径: "./assets/logo.svg"
    logo:
        light: "/images/favicon.svg"
        dark: "/images/favicon-dark.svg"
    author: "React Docs UI Team"

# 顶部导航配置
navbar:
    showLogo: true
    showTitle: true
    showLanguageSwitcher: true
    items:
        - title: "首页"
          link: "/"
          active: true
        - title: "文档"
          link: "/docs"
    actions:
        - type: "github"
          link: "https://github.com/shenjianZ/React-docs-ui"
          enabled: true
        # 支持常见代码托管/外链平台，也支持按 icon/type 自定义
        # 可选 icon/type 示例：github、gitee、gitea、gitlab、link、external、globe
        - type: "gitee"
          link: "https://gitee.com/your-org/your-repo"
          enabled: false
        - type: "gitea"
          link: "https://git.example.com/your-org/your-repo"
          enabled: false
        - title: "API"
          icon: "link"
          link: "https://example.com/api"
          enabled: false

announcement:
    enabled: true
    text: "React Docs UI 已支持 Tabs、Mermaid 与 llms.txt"
    link: "https://github.com/shenjianZ/react-docs-ui"
    dismissible: true

# 侧边栏导航配置
sidebar:
    enabled: true
    collections:
        docs:
            sections:
                - title: "快速开始"
                  path: "/docs/guide"
                  children:
                      - title: "介绍"
                        path: "/docs/guide/introduction"
                      - title: "安装"
                        path: "/docs/guide/installation"
                      - title: "快速上手"
                        path: "/docs/guide/quick-start"
                      - title: "配置说明"
                        path: "/docs/guide/configuration"
                      - title: "PDF Server 部署"
                        path: "/docs/guide/pdf-server"
                - title: "文档测试"
                  path: "/docs/test"
                  children:
                      - title: "MD测试"
                        path: "/docs/test/test"
                      - title: "katex测试"
                        path: "/docs/test/katex-test"
                      - title: "MDX 演示"
                        path: "/docs/test/mdx-test"
                      - title: "Frontmatter测试"
                        path: "/docs/test/frontmatter-test"

# Theme Configuration
theme:
    # Default theme mode: 'light' | 'dark' | 'auto'
    # light: Force light mode
    # dark: Force dark mode
    # auto: Follow system preference (default)
    defaultMode: "auto"

    # Allow users to toggle theme (show theme toggle button)
    allowToggle: true

# Table of Contents Configuration
toc:
    # Maximum heading level to display in TOC (1-6)
    maxLevel: 3

    # Enable table of contents
    enabled: true

    # TOC title
    title: "本页目录"

# 图片查看器配置
imageViewer:
    enabled: true
    labels:
        preview: "预览图片"
        zoomIn: "放大"
        zoomOut: "缩小"
        fit: "适配窗口"
        actualSize: "原始比例"
        reset: "重置"
        rotateLeft: "左旋"
        rotateRight: "右旋"
        fullscreen: "全屏"
        download: "下载"
        openInNewTab: "新标签打开"
        close: "关闭图片查看器"

# Footer Configuration
footer:
    enabled: true
    copyright: "© 2026 React Docs UI. All rights reserved."
    repository:
        url: "https://github.com/shenjianZ/React-docs-ui"
        branch: "master"
    lastUpdated: "2026-03-05"
    version: "v0.4.0"
    groups:
        - title: "社区"
          items:
              - title: "讨论区"
                link: "https://github.com/shenjianZ/React-docs-ui/discussions"
                external: true
              - title: "问题反馈"
                link: "https://github.com/shenjianZ/React-docs-ui/issues"
                external: true
              - title: "贡献指南"
                link: "https://github.com/shenjianZ/React-docs-ui/blob/master/CONTRIBUTING.md"
                external: true
              - title: "版本发布"
                link: "https://github.com/shenjianZ/React-docs-ui/releases"
                external: true
        - title: "帮助支持"
          items:
              - title: "快速开始"
                link: "/docs/guide"
              - title: "源代码"
                link: "https://github.com/shenjianZ/React-docs-ui"
                external: true
              - title: "开源许可"
                link: "https://github.com/shenjianZ/React-docs-ui/blob/master/LICENSE"
                external: true
              - title: "回到顶部"
                link: "#"
                action: "scrollTop"
    links:
        - title: "Documentation"
          link: "/guide/introduction"
        - title: "GitHub"
          link: "https://github.com/shenjianZ/React-docs-ui"
          external: true
        - title: "License"
          link: "/license"
    social:
        - name: "email"
          url: "mailto:contact@example.com"
          icon: "mail"
        - name: "github"
          url: "https://github.com/your_github_id"
          icon: "github"
        # - name: "youtube"
        #   url: "https://youtube.com/@yourhandle"
        #   icon: "youtube"
        # - name: "twitter"
        #   url: "https://twitter.com/yourhandle"
        #   icon: "twitter"
        # - name: "discord"
        #   url: "https://discord.gg/yourinvite"
        #   icon: "discord"
        # - name: "telegram"
        #   url: "https://t.me/yourhandle"
        #   icon: "telegram"
        # - name: "tiktok"
        #   url: "https://tiktok.com/@yourhandle"
        #   icon: "tiktok"
        - name: "bilibili"
          url: "https://space.bilibili.com/your_bilibili_id"
          icon: "bilibili"
        - name: "qq"
          url: "mqqapi://card/show_pslcard?src_type=internal&version=1&uin=your_qq_id&card_type=person&source=qrcode"
          icon: "qq"
        - name: "wechat"
          url: "weixin://dl/add?your_wechat_id"
          icon: "wechat"
        # - name: "weibo"
        #   url: "https://weibo.com/yourhandle"
        #   icon: "weibo"
        # - name: "douyin"
        #   url: "https://www.douyin.com/user/yourhandle"
        #   icon: "douyin"
        # - name: "zhihu"
        #   url: "https://www.zhihu.com/people/yourhandle"
        #   icon: "zhihu"

# PWA Configuration
pwa:
    enabled: true
    name: "React Docs UI"
    shortName: "ReactDocsUI"
    description: "Beautiful documentation websites made simple"
    themeColor: "#ffffff"
    backgroundColor: "#ffffff"

# 右键菜单配置
contextMenu:
    # 全局开关，false 则完全禁用右键菜单
    enabled: true

    # 页面组菜单项配置
    page:
        copySelectedText: true # 复制选中的文字
        copyUrl: true # 复制当前链接
        copyTitle: false # 复制页面标题
        copyMarkdownLink: false # 复制 Markdown 链接
        openInNewTab: false # 在新标签页打开
        reload: true # 刷新
        printPage: true # 打印页面
        scrollToTop: true # 回到顶部
        scrollToBottom: true # 滚动到底部

    # 站点组菜单项配置
    site:
        goHome: true # 返回首页
        quickNav: false # 快速跳转
        language: false # 语言切换

    # 外观组菜单项配置
    appearance:
        theme: false # 主题切换
        resetThemePref: false # 重置主题偏好

# MDX 组件配置
mdx:
    componentsPath: "/src/components" # 组件扫描路径
    enabled: true # 启用 MDX 支持

# 字体配置
fonts:
    fontFamilyZhCn: "MiSans, PingFang SC, Noto Sans SC, Microsoft YaHei, sans-serif"
    fontFamilyEn: "Fragment Mono, system-ui, sans-serif"
    downloadFonts:
        - "FragmentMono-Italic.woff2"
        - "FragmentMono-Regular.woff2"
        - "MiSans-Bold.woff2"
        - "MiSans-Medium.woff2"
        - "MiSans-Regular.woff2"

# 代码高亮配置
codeHighlight:
    # 支持的常用语言/别名示例:
    # bash, shell, sh
    # javascript, js
    # typescript, ts
    # jsx, tsx
    # json
    # yaml, yml
    # markdown, md
    # html, css, scss, less
    # python, py
    # java, c, cpp, csharp, go, rust, ruby, php, swift, kotlin, sql
    # vue, svelte, docker, dockerfile, nginx, xml, diff, regex
    # 如需更多语言，可继续追加到 langs；名称需与 Shiki 语言名或这里的别名一致
    # 仅预加载当前站点会用到的语言，未列出的代码块会回退为普通 code 显示
    langs:
        - "bash"
        - "markdown"
        - "yaml"
        - "javascript"
        - "jsx"
        - "json"
        - "tsx"
        - "typescript"
    lightTheme: "github-light"
    darkTheme: "github-dark"

# 全文搜索配置
search:
    enabled: true
    placeholder: "搜索文档..."
    maxResults: 20
    snippetLength: 120

# 导出功能配置
export:
    enabled: true
    markdown: true
    pdf: true
    word: true
    allDocs: true
    # PDF 服务器配置 (可选)
    # 启用后将使用服务器端生成 PDF，否则使用浏览器原生打印
    pdfServer:
        enabled: true
        url: "http://localhost:3001"

pageMeta:
    showLastUpdated: true
    showEditLink: true
    showAuthors: true
    preferGitMeta: true

editLink:
    enabled: true
    label: "编辑此页"
    urlTemplate: "https://github.com/shenjianZ/react-docs-ui/edit/master/{filePath}"

feedback:
    enabled: true
    endpoint: ""
    method: "POST"
    includePageMeta: true
    labels:
        helpful: "有帮助"
        unhelpful: "没帮助"
        inputPlaceholder: "可以补充哪里不清楚或不准确"
        submit: "提交反馈"
        thanks: "感谢反馈"

ai:
    enabled: true
